name: CI

on:
  push:
  pull_request:

jobs:
  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint V3 and command modules
        run: ruff check src/market_predictor/v3 src/market_predictor/commands tests/test_v3_foundation.py tests/test_architecture_boundaries.py

      - name: Type check V3 contracts
        run: mypy src/market_predictor/v3

      - name: Compile source
        run: python -m compileall src/market_predictor

      - name: CLI smoke test
        run: market-predictor --help

      - name: Unit tests
        run: python -m unittest discover -s tests
