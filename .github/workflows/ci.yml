name: CI

on:
  push:
  pull_request:

jobs:
  package-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile source
        run: python -m compileall src/market_predictor

      - name: CLI smoke test
        run: market-predictor --help
