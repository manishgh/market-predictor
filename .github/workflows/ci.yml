name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONPATH: ${{ github.workspace }}/src

jobs:
  validation:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/validation.lock

      - name: Install hash-locked validation dependencies
        run: |
          python -m pip install --require-hashes --no-deps -r requirements/validation.lock
          python -m pip install --no-build-isolation --no-deps -e .

      - name: Verify dependency locks are reproducible
        run: |
          python scripts/lock_dependencies.py
          git diff --exit-code -- requirements

      - name: Run repository-wide static checks
        run: |
          ruff check src tests scripts
          mypy --strict src/market_predictor scripts
          python -m compileall -q src tests scripts

      - name: Verify all command surfaces
        run: |
          python -m market_predictor.production_cli --help
          python -m market_predictor.collection_cli --help
          python -m market_predictor.research_cli --help

      - name: Run full unit suite
        run: python -m unittest discover -s tests

      - name: Verify clean production dependency surface
        run: |
          uv venv --python 3.11 .production-smoke
          uv pip install --python .production-smoke/bin/python --require-hashes --no-deps -r requirements/production.lock
          .production-smoke/bin/python -c "import market_predictor.api, market_predictor.production_cli"
          .production-smoke/bin/python -c "import importlib.util; forbidden=['azure','bs4','torch','transformers','xgboost','yfinance']; found=[name for name in forbidden if importlib.util.find_spec(name) is not None]; assert not found, found"

      - name: Produce Python dependency audit, SBOM, and license reports
        run: |
          mkdir -p artifacts
          pip-audit --require-hashes -r requirements/production.lock --progress-spinner off --format json --output artifacts/pip-audit-production.json
          pip-audit --require-hashes -r requirements/production.lock --progress-spinner off --format cyclonedx-json --output artifacts/production-python-sbom.cdx.json
          pip-licenses --python .production-smoke/bin/python --format json --output-file artifacts/production-licenses.json

      - name: Build ephemeral signed container smoke release
        run: python scripts/build_container_smoke_release.py --output artifacts/container-smoke

      - name: Upload validation evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: validation-evidence
          path: artifacts
          if-no-files-found: error
          retention-days: 14

  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out full history
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Scan repository history for secrets
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  production-container:
    needs: validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download signed smoke release
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: validation-evidence
          path: artifacts

      - name: Build production image
        run: |
          docker build \
            --build-arg SOURCE_REVISION="${GITHUB_SHA}" \
            --tag "market-predictor:${GITHUB_SHA}" \
            .

      - name: Start hardened production container
        run: |
          docker run --detach \
            --name market-predictor-smoke \
            --publish 127.0.0.1:8000:8000 \
            --memory 4g \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --tmpfs /app/data:rw,noexec,nosuid,size=256m,uid=10001,gid=10001 \
            --volume "${PWD}/artifacts/container-smoke:/smoke:ro" \
            --env APP_CONFIG_PATH=/smoke/app_config.toml \
            --env API_ENVIRONMENT=development \
            --env API_AUTH_MODE=development \
            --env API_DEVELOPMENT_BEARER_TOKEN="${GITHUB_SHA}${GITHUB_SHA}" \
            --env API_REPLAY_ENABLED=false \
            "market-predictor:${GITHUB_SHA}"

      - name: Verify startup, liveness, fail-closed readiness, and memory
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8000/v1/health/live > artifacts/container-liveness.json; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs market-predictor-smoke
              exit 1
            fi
            sleep 2
          done
          test "$(docker inspect --format '{{.Config.User}}' market-predictor-smoke)" = "10001:10001"
          readiness_status="$(curl --silent --output artifacts/container-readiness.json --write-out '%{http_code}' http://127.0.0.1:8000/v1/health/ready)"
          test "$readiness_status" = "503"
          docker stats --no-stream --format '{{json .}}' market-predictor-smoke > artifacts/container-memory.json

      - name: Scan image for critical vulnerabilities
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: market-predictor:${{ github.sha }}
          format: json
          output: artifacts/container-vulnerabilities.json
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: false

      - name: Produce image SBOM
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          image-ref: market-predictor:${{ github.sha }}
          format: cyclonedx
          output: artifacts/container-sbom.cdx.json

      - name: Upload container evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: container-evidence
          path: artifacts
          if-no-files-found: error
          retention-days: 14

      - name: Stop container
        if: always()
        run: docker rm --force market-predictor-smoke || true
